<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>TF大学模拟器测试004(作者仓鼠盐)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ============================
   基础变量（默认=白日低语）
   ============================ */
:root{
  --pri:#191919;--prl:#EED7DD;
  --pk:#B8848E;--pkl:#F5E6EA;
  --blue:#191919;--bg:#FDFDFD;--card:rgba(255,255,255,.78);
  --story-bg:rgba(246,234,238,.72);
  --txt:#191919;--tx2:#6B6B69;--tx3:#CBCBC9;
  --ok:#10B981;--bdr:rgba(255,255,255,.45);--red:#EF4444;
  --sh:0 2px 12px rgba(25,25,25,.05);
  --r:14px;--topH:42px;--bbarH:50px;
  --safeT:env(safe-area-inset-top,0px);
  --safeB:env(safe-area-inset-bottom,0px);
  /* 玻璃拟态 */
  --glass-bg:rgba(255,255,255,.15);
  --glass-blur:blur(12px);
  --glass-border:1px solid rgba(255,255,255,.45);
  --glass-card:rgba(255,255,255,.78);
  --glass-card-border:1px solid rgba(255,255,255,.5);
  --glass-btn:rgba(255,255,255,.25);
  --glass-btn-border:1px solid rgba(255,255,255,.4);
  /* 顶栏/特殊 */
  --topbar-bg:linear-gradient(135deg,rgba(25,25,25,.82),rgba(58,47,51,.82));
  --topbar-sh:0 2px 12px rgba(25,25,25,.15);
  --topbar-item:rgba(238,215,221,.2);
  --topbar-item-active:rgba(238,215,221,.4);
  /* 按钮 */
  --pri-btn:linear-gradient(135deg,#191919,#3A2F33);
  --pk-btn:linear-gradient(135deg,#B8848E,#D4A8B0);
  /* 文字特殊 */
  --dlg-color:#A0505E;
  --story-card-border:1px solid rgba(226,202,207,.6);
  --meta-bg:rgba(255,255,255,.75);
  --stat-change-bg:rgba(255,255,255,.75);
  --scene-end-bg:rgba(255,255,255,.55);
  --reminder-bg:#FEF3C7;--reminder-bdr:#F59E0B;--reminder-txt:#92400E;
  /* 好感标签 */
  --fc-icon:'♥';--fc-icon-color:#B8848E;
  /* 进度条 */
  --bar-c2-from:#191919;--bar-c2-to:#5A5A5A;
  --bar-c3-from:#B8848E;--bar-c3-to:#EED7DD;
  --bar-c4-from:#D4A373;--bar-c4-to:#FFDDB5;
  --bar-c6-from:#7EAAB2;--bar-c6-to:#B5D6DE;
  /* 弹窗遮罩 */
  --overlay:rgba(25,25,25,.35);
  /* 输入框 */
  --input-bg:rgba(240,237,236,.6);
  --input-border:rgba(216,212,211,.6);
  --input-focus-sh:0 0 0 3px rgba(25,25,25,.06);
  /* 聊天 */
  --msg-them:rgba(255,255,255,.72);
  --msg-me:linear-gradient(135deg,rgba(25,25,25,.85),rgba(58,47,51,.85));
  --msg-them-border:1px solid rgba(255,255,255,.45);
  --char-active-bg:rgba(238,215,221,.4);
}

/* ============================
   主题B: 午夜玫瑰
   ============================ */
[data-theme="midnight"]{
  --pri:#EED7DD;--prl:rgba(238,215,221,.12);
  --pk:#D4A0AB;--pkl:rgba(212,160,171,.1);
  --blue:#EED7DD;--bg:#191919;--card:rgba(34,34,34,.78);
  --story-bg:rgba(30,26,28,.72);
  --txt:#FDFDFD;--tx2:#CBCBC9;--tx3:#7A7A78;
  --ok:#10B981;--bdr:rgba(58,53,56,.6);--red:#EF4444;
  --sh:0 2px 12px rgba(0,0,0,.2);
  --glass-bg:rgba(34,34,34,.2);
  --glass-blur:blur(12px);
  --glass-border:1px solid rgba(238,215,221,.12);
  --glass-card:rgba(34,34,34,.78);
  --glass-card-border:1px solid rgba(238,215,221,.1);
  --glass-btn:rgba(238,215,221,.1);
  --glass-btn-border:1px solid rgba(238,215,221,.15);
  --topbar-bg:linear-gradient(135deg,rgba(42,31,35,.85),rgba(25,25,25,.85));
  --topbar-sh:0 2px 12px rgba(0,0,0,.3);
  --topbar-item:rgba(238,215,221,.15);
  --topbar-item-active:rgba(238,215,221,.3);
  --pri-btn:linear-gradient(135deg,rgba(238,215,221,.9),rgba(212,160,171,.9));
  --pk-btn:linear-gradient(135deg,#D4A0AB,#EED7DD);
  --dlg-color:#F0B8C4;
  --story-card-border:1px solid rgba(58,47,51,.6);
  --meta-bg:rgba(238,215,221,.12);
  --stat-change-bg:rgba(238,215,221,.1);
  --scene-end-bg:rgba(238,215,221,.08);
  --reminder-bg:rgba(245,158,11,.1);--reminder-bdr:#F59E0B;--reminder-txt:#FCD34D;
  --fc-icon:'✦';--fc-icon-color:#D4A0AB;
  --bar-c2-from:#EED7DD;--bar-c2-to:#F5E6EA;
  --bar-c3-from:#D4A0AB;--bar-c3-to:#EED7DD;
  --bar-c4-from:#D4A373;--bar-c4-to:#F0C9A0;
  --bar-c6-from:#7EAAB2;--bar-c6-to:#A8D0DA;
  --overlay:rgba(0,0,0,.5);
  --input-bg:rgba(42,38,40,.6);
  --input-border:rgba(58,53,56,.6);
  --input-focus-sh:0 0 0 3px rgba(238,215,221,.1);
  --msg-them:rgba(42,38,40,.72);
  --msg-me:linear-gradient(135deg,rgba(238,215,221,.85),rgba(212,160,171,.85));
  --msg-them-border:1px solid rgba(58,53,56,.5);
  --char-active-bg:rgba(238,215,221,.1);
}
[data-theme="midnight"] .bbar .sb,
[data-theme="midnight"] .mc-c,
[data-theme="midnight"] .cp-actions .go,
[data-theme="midnight"] .wb{color:#191919}
[data-theme="midnight"] .msg.me{color:#191919}
[data-theme="midnight"] .sb2.p{color:#191919}
[data-theme="midnight"] .topbar .start-title{color:#EED7DD}

/* ============================
   主题C: 灰粉花瓣
   ============================ */
[data-theme="silver"]{
  --pri:#5A4D51;--prl:#EED7DD;
  --pk:#9E7882;--pkl:#F5E6EA;
  --blue:#5A4D51;--bg:#F0EDEC;--card:rgba(253,253,253,.78);
  --story-bg:rgba(238,215,221,.55);
  --txt:#191919;--tx2:#6B6B69;--tx3:#CBCBC9;
  --ok:#10B981;--bdr:rgba(216,212,211,.5);--red:#EF4444;
  --sh:0 2px 10px rgba(25,25,25,.04);
  --glass-bg:rgba(253,253,253,.18);
  --glass-blur:blur(12px);
  --glass-border:1px solid rgba(253,253,253,.5);
  --glass-card:rgba(253,253,253,.78);
  --glass-card-border:1px solid rgba(253,253,253,.55);
  --glass-btn:rgba(253,253,253,.3);
  --glass-btn-border:1px solid rgba(253,253,253,.45);
  --topbar-bg:linear-gradient(135deg,rgba(90,77,81,.85),rgba(122,107,111,.85));
  --topbar-sh:0 2px 10px rgba(90,77,81,.15);
  --topbar-item:rgba(253,253,253,.2);
  --topbar-item-active:rgba(253,253,253,.35);
  --pri-btn:linear-gradient(135deg,#5A4D51,#7A6B6F);
  --pk-btn:linear-gradient(135deg,#9E7882,#C4A0AA);
  --dlg-color:#8B3A4A;
  --story-card-border:1px solid rgba(226,202,207,.5);
  --meta-bg:rgba(253,253,253,.75);
  --stat-change-bg:rgba(253,253,253,.75);
  --scene-end-bg:rgba(253,253,253,.5);
  --reminder-bg:#FEF3C7;--reminder-bdr:#F59E0B;--reminder-txt:#92400E;
  --fc-icon:'❀';--fc-icon-color:#9E7882;
  --bar-c2-from:#5A4D51;--bar-c2-to:#8A7D81;
  --bar-c3-from:#9E7882;--bar-c3-to:#D4A8B0;
  --bar-c4-from:#C9A87C;--bar-c4-to:#E8D5B5;
  --bar-c6-from:#6B9DA6;--bar-c6-to:#A8D0DA;
  --overlay:rgba(25,25,25,.3);
  --input-bg:rgba(240,237,236,.6);
  --input-border:rgba(216,212,211,.6);
  --input-focus-sh:0 0 0 3px rgba(90,77,81,.08);
  --msg-them:rgba(253,253,253,.72);
  --msg-me:linear-gradient(135deg,rgba(90,77,81,.85),rgba(122,107,111,.85));
  --msg-them-border:1px solid rgba(253,253,253,.45);
  --char-active-bg:rgba(238,215,221,.4);
}

/* ============================
   全局样式 + 玻璃拟态
   ============================ */
html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5;overflow:hidden;position:fixed;-webkit-text-size-adjust:100%;transition:background .4s,color .3s}

/* === 顶栏 === */
.topbar{position:fixed;top:0;left:0;right:0;height:calc(var(--topH) + var(--safeT));padding-top:var(--safeT);background:var(--topbar-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);display:flex;align-items:center;padding-left:6px;padding-right:6px;z-index:500;box-shadow:var(--topbar-sh);border-bottom:var(--glass-border)}
.topbar .back-btn{background:var(--topbar-item);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);color:#fff;width:30px;height:28px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-right:4px;transition:background .2s}
.topbar .back-btn:active{background:var(--topbar-item-active)}
.topbar .start-title{color:#fff;font-size:14px;font-weight:700;flex:1;text-align:center}
.topbar .badges{display:flex;gap:3px;align-items:center;flex:1;margin-left:4px}
.topbar .bg{background:var(--topbar-item);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);color:#fff;font-size:10px;padding:2px 6px;border-radius:7px;font-weight:600;white-space:nowrap}
.topbar .right-icons{display:flex;gap:3px;align-items:center;flex-shrink:0;margin-left:auto}
.topbar .ib{background:var(--topbar-item);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);color:#fff;width:28px;height:28px;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s}
.topbar .ib:active{transform:scale(.92);background:var(--topbar-item-active)}

.main{position:fixed;top:calc(var(--topH) + var(--safeT));left:0;right:0;bottom:calc(var(--bbarH) + var(--safeB));overflow:hidden;display:flex;flex-direction:column}
.main.no-bbar{bottom:var(--safeB)}

/* === 底栏 === */
.bbar{position:fixed;left:0;right:0;bottom:0;background:var(--glass-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-top:var(--glass-border);display:flex;align-items:center;padding:6px 8px;padding-bottom:calc(6px + var(--safeB));gap:6px;z-index:500;height:calc(var(--bbarH) + var(--safeB))}
.bbar.hide{display:none}
.bbar input{flex:1;height:36px;border:1.5px solid var(--input-border);border-radius:18px;padding:0 14px;font-size:14px;background:var(--input-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);color:var(--txt);outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s}
.bbar input:focus{border-color:var(--pri);box-shadow:var(--input-focus-sh)}
.bbar .sb{width:36px;height:36px;border-radius:50%;background:var(--pri-btn);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.bbar .sb:active{transform:scale(.92)}

/* === 卡片基础(玻璃拟态) === */
.cd{background:var(--glass-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-radius:var(--r);box-shadow:var(--sh);border:var(--glass-card-border);transition:background .3s}
.cd-t{font-size:12px;font-weight:700;color:var(--pri);display:flex;align-items:center;gap:4px}

.game-wrap{display:none;flex:1;flex-direction:column;overflow:hidden;padding:5px 6px;gap:5px;min-height:0}
.game-wrap.show{display:flex}

/* === 标签栏 === */
.tabs-bar{display:flex;gap:2px;flex-shrink:0;background:var(--glass-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-radius:10px;padding:3px;box-shadow:var(--sh);border:var(--glass-card-border)}
.tb{flex:1;background:transparent;border:none;border-radius:7px;padding:5px 2px;font-size:11px;color:var(--tx2);font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.tb.on{background:var(--pri-btn);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1)}

.panel-area{flex-shrink:0;max-height:32vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel-area .cd{padding:8px 10px}
.act-info{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:5px}
.act-info .energy-info{color:var(--pri);font-weight:700}
.act-info .actions-info{color:var(--red);font-weight:700}

/* === 行动按钮(玻璃) === */
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.ab{background:var(--glass-btn);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);border-radius:12px;padding:8px 2px;font-size:10px;color:var(--pri);cursor:pointer;text-align:center;-webkit-appearance:none;line-height:1.2;font-weight:600;transition:all .2s}
.ab .ae{font-size:18px;display:block;margin-bottom:2px}
.ab:active{background:var(--pri);color:#fff;border-color:var(--pri);transform:scale(.95)}

/* === 属性 === */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:5px}
.si{display:flex;align-items:center;gap:3px;font-size:10px;padding:1px 0}
.sbw{flex:1;height:4px;background:rgba(128,128,128,.15);border-radius:2px;overflow:hidden}
.sbb{height:100%;border-radius:2px;transition:width .5s}
.sv{font-weight:700;font-size:9px;min-width:24px;text-align:right}
.c1{background:linear-gradient(90deg,#10B981,#34D399)}
.c2{background:linear-gradient(90deg,var(--bar-c2-from),var(--bar-c2-to))}
.c3{background:linear-gradient(90deg,var(--bar-c3-from),var(--bar-c3-to))}
.c4{background:linear-gradient(90deg,var(--bar-c4-from),var(--bar-c4-to))}
.c5{background:linear-gradient(90deg,#EF4444,#FCA5A5)}
.c6{background:linear-gradient(90deg,var(--bar-c6-from),var(--bar-c6-to))}

/* === 好感标签 === */
.fl{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.fc{background:var(--prl);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);border-radius:20px;padding:3px 10px 3px 8px;font-size:10px;color:var(--pri);font-weight:600}

/* === 偷看 === */
.peek-box{padding:10px;text-align:center}
.peek-btn{background:var(--pk-btn);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);color:#fff;border-radius:12px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;transition:transform .15s}
.peek-btn:active{transform:scale(.96)}
.peek-result{margin-top:10px;font-size:12px;color:var(--txt);text-align:left;line-height:1.7}
.peek-thought{background:var(--pkl);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);border-left:3px solid var(--pk);padding:8px 10px;margin-bottom:6px;border-radius:6px;font-style:italic}
.peek-thought b{color:var(--pk);font-style:normal}

/* === 地图弹窗 === */
.map-pop{position:fixed;left:6px;right:6px;background:var(--glass-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);border:1.5px solid var(--pri);z-index:550;max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:none}
.map-pop.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.map-cat{font-size:12px;font-weight:700;color:var(--pri);margin:6px 0 4px;padding-left:4px;border-left:3px solid var(--prl)}
.map-cat:first-child{margin-top:0}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.map-item{background:var(--glass-btn);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);border-radius:8px;padding:7px 8px;cursor:pointer;font-size:11px;color:var(--pri);font-weight:600;text-align:left;line-height:1.3;transition:all .2s}
.map-item:active{background:var(--pri);color:#fff;border-color:var(--pri)}
.map-item .mi-desc{display:block;font-size:9px;color:var(--tx2);font-weight:400;margin-top:1px}
.map-item:active .mi-desc{color:rgba(255,255,255,.85)}
.map-item.disabled{background:rgba(128,128,128,.05);color:var(--tx3);cursor:not-allowed;opacity:.6}
.map-item.disabled:active{background:rgba(128,128,128,.05);color:var(--tx3)}

/* === 故事卡(玻璃) === */
.story-card{flex:1;display:flex;flex-direction:column;background:var(--story-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-radius:var(--r);box-shadow:var(--sh);border:var(--story-card-border);padding:6px 10px;min-height:0;overflow:hidden;transition:background .3s}
.story-card .cd-t{flex-shrink:0;margin-bottom:4px;color:var(--pri)}
.story-box{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-right:3px;min-height:0}
.story-txt{font-size:13.5px;line-height:1.8;color:var(--txt);white-space:pre-wrap;word-break:break-word}
.story-txt .dlg{color:var(--dlg-color);font-weight:600;font-style:italic}
.story-txt .meta-line{background:none;border:none;border-radius:0;padding:0;margin-bottom:6px;font-size:11px;color:var(--tx2);font-weight:600;line-height:1.4;display:block}
.story-txt .stat-change{display:block;background:var(--stat-change-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);padding:5px 9px;border-radius:6px;margin-top:6px;font-size:11px;color:var(--txt);font-weight:700}
.story-txt .reminder{display:block;background:var(--reminder-bg);border-left:3px solid var(--reminder-bdr);padding:6px 10px;border-radius:6px;margin-top:8px;font-size:11px;color:var(--reminder-txt);font-weight:600}
.story-txt .scene-end{display:block;background:var(--scene-end-bg);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);text-align:center;padding:6px 10px;border-radius:6px;margin-top:8px;font-size:12px;color:var(--pri);font-weight:600;font-style:italic}
.tc{display:inline-block;width:2px;height:1em;background:var(--pri);margin-left:1px;animation:bk .8s infinite;vertical-align:text-bottom}
.gen-tag{color:var(--tx3);font-size:11px;font-style:italic}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}

/* === 选择卡(玻璃) === */
.choice-card{flex-shrink:0;max-height:28vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--glass-card);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-radius:var(--r);box-shadow:var(--sh);border:var(--glass-card-border);padding:6px 10px;display:none}
.choice-card.show{display:block}
.choice-card .cd-t{margin-bottom:5px}
.ch-w{display:flex;flex-direction:column;gap:4px}
.ch-b{background:var(--glass-btn);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border:1.5px solid var(--pri);border-radius:12px;padding:7px 10px;font-size:12px;color:var(--pri);font-weight:600;cursor:pointer;text-align:left;-webkit-appearance:none;width:100%;transition:all .2s}
.ch-b:active{background:var(--pri);color:#fff}

/* === 全屏面板 === */

const INIT_STORIES={
'custom':`站在TF大学校门口，行李箱的轮子压过水泥地，发出咕噜咕噜的声响。暑假好像还没过够，最后几天疯狂补番、跟高中同学吃散伙饭。那个漫长到仿佛不会结束的夏天，在爸妈帮你关上车门的那一刻，突然就收尾了。\n\n现在，陌生的校园铺展在眼前，阳光很亮，空气里有青草和新书混在一起的味道。手心有点出汗，心跳快了几拍。说不上紧张还是兴奋，但你知道，从今天开始，一切都不一样了。`,
'张函瑞':`暑假好像也没干什么正经事。帮街舞社剪了几个视频，追了两部韩剧，练了几首新歌。本来想学点东西的，结果大部分时间都躺在沙发上刷手机。返校前一晚收拾行李，才发现带回去的书一页都没翻。\n\n现在坐在寝室的床边，看着空荡荡的走廊和对面教学楼，莫名觉得有点恍神。新的学期啊，不知道会发生什么，但总觉得应该会比暑假有意思一点吧。`,
'左奇函':`暑假去了趟海边，晒黑了一点。家里饭局太多，吃到后面已经分不清谁是谁了。偶尔会想起学校的日子——虽然上课很烦，但跟朋友待在一起的感觉还是不一样。放假前信誓旦旦说要自学软件，结果打开过一次就再也没打开过。\n\n现在站在宿舍楼门口，拖着行李箱，心里说不上特别激动，但也不抗拒。反正大学就是这样，过一天算一天，但过的时候还挺开心。`,
'张桂源':`暑假打了两个月工，攒了一点钱，记账本又厚了几页。每天早起去便利店上班，下班后回家躺平。偶尔会怀念在球场投篮的那个没人打扰、只有篮筐和汗水的时间。是不是有点矫情？算了。\n\n现在站在校门口，看着熟悉的教学楼，手里的篮球好像比暑假前重了一点。没关系，手感慢慢找回来就行。`,
'杨博文':`暑假哪里都没去。在家看书、吃饭、睡觉，偶尔下楼走走。爸妈问你在学校怎么样，你说还行。他们也没再多问。返校前一晚失眠了，躺在床上想了很多有的没的，想着想着就天亮了。\n\n现在坐在模拟法庭的旁听席上，窗外有鸟叫。这里比家里安静。新的学期好像也没什么特别的感觉，就是……该做的事情还是得做。`,
'王橹杰':`暑假的前半个月都在调作息，调完发现暑假已经过完一半了。练琴的时候总是走神，脑子里会冒出一些奇怪的想法。偶尔拿起手机，看看群里的消息，但懒得回。返校的路上一直在听歌，耳机里的声音盖过了窗外的风声。\n\n现在坐在寝室，床帘拉了一半，光线斜斜地照进来。不想动。不想说话。但好像，也没有那么不想开学。`,
'陈奕恒':`暑假回了一趟英国，见了很久没见的家人和旧朋友。他们说你的中文进步了，你说"maybe a little"。其实还是经常卡壳。吃到了好想念的炸鱼薯条，但也想学校的酸辣粉。回来那天飞机晚点，在机场等了很久，耳机里的歌循环了一遍又一遍。\n\n现在在宿舍床上坐了一会儿，阳光从窗户照进来，有点暖。新学期的课表还没仔细看，但是慢慢来吧。`,
'陈浚铭':`暑假每天都吃得很饱，但还是会想念学校的酸辣粉。有时候半夜刷到食堂的美食照片，馋得不行。在家躺了两个多月，体重居然没怎么涨，你妈说你白吃了。返校前一晚兴奋得没睡好，翻来覆去地想开学第一天要吃什么早餐。\n\n现在站在宿舍门口，肚子已经咕咕叫了。暑假吃得再好，也没有学校的那种味道。`,
'陈思罕':`暑假写了好几首新歌的片段，但没有一首是完整的。灵感总是在半夜来，爬起来记几个和弦，第二天再看又觉得不好。大多数时间在追剧、打游戏、虚度光阴。返校前整理琴包的时候，发现拨片少了好几个。算了，开学再买。\n\n现在坐在床边，手里的吉他还带着暑假的气息，说不上是懒惰还是自由。新的学期，应该能写完一首吧。`

async function fetchModels(){
if(!API_URL||!API_KEY){toast('请先填URL和Key','info');return}
try{const r=await fetch(`${API_URL}/models`,{headers:{'Authorization':`Bearer ${API_KEY}`}});const d=await r.json();const s=document.getElementById('cfgModel');s.innerHTML='<option value="">请选择</option>';
if(d.data&&Array.isArray(d.data)){d.data.forEach(m=>{const o=document.createElement('option');o.value=m.id;o.textContent=m.id;if(m.id===MODEL)o.selected=true;s.appendChild(o)});toast(`✅ 拉取${d.data.length}个模型`,'ok')}}catch(e){toast('❌ 拉取失败','info')}}

async function streamAPI(msgs,onChunk,onDone,signal){
if(!API_URL||!API_KEY||!MODEL){toast('请先配置API','info');openSettings();onDone('（请先配置API）');return}
try{const r=await fetch(`${API_URL}/chat/completions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},body:JSON.stringify({model:MODEL,messages:msgs,stream:true,temperature:0.85,max_tokens:2000}),signal});
if(!r.ok)throw new Error(await r.text());
const reader=r.body.getReader();const dec=new TextDecoder();let full='',buf='';
while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
for(const l of lines){const t=l.trim();if(!t||t==='data: [DONE]')continue;if(!t.startsWith('data: '))continue;try{const j=JSON.parse(t.slice(6));const d=j.choices?.[0]?.delta?.content;if(d){full+=d;onChunk(d,full)}}catch(e){}}}
onDone(full)}catch(e){if(e.name==='AbortError')onDone('（已中断）');else{toast('❌ 请求失败','info');onDone('（请求失败）')}}}

const cls=m.startsWith('+')?'stat-plus':'stat-minus';

function formatStory(text){
let html=esc(text);
html=html.replace(/^\s*$$([^$$]+)\]/m,'<span class="meta-line">$1</span>');
html=html.replace(/&lt;dlg&gt;([\s\S]*?)&lt;\/dlg&gt;/g,'<span class="dlg">$1</span>');
html=html.replace(/\{\{数值变化[：:]\s*([^}]+)\}\}/g,(_,c)=>{
const items=c.split(/[,，]/).map(s=>s.trim()).filter(s=>s);
const lines=items.map(item=>{
const fm=item.match(/好感_([\u4e00-\u9fa5\w]+)\s*([+-]\s*\d+)/);
if(fm){const v=fm[2].replace(/\s/g,'');const cls=v.startsWith('+')?'stat-plus':'stat-minus';return `<span class="${cls}">【${fm[1]}】好感度${v}</span>`}
const sm=item.match(/([\u4e00-\u9fa5\w]+)\s*([+-]\s*\d+)/);
if(sm){const v=sm[2].replace(/\s/g,'');const cls=v.startsWith('+')?'stat-plus':'stat-minus';return `<span class="${cls}">${sm[1]}${v}</span>`}
return item}).join('<br>');
return `<span class="stat-change">📊 数值变化<br>${lines}</span>`});
html=html.replace(/\{\{获得物品[：:]\s*([^}]+)\}\}/g,function(_,c){
var parts=c.split(/[,，]/).map(function(s){return s.trim()});
var iname='',ifrom='';
parts.forEach(function(p){
var kv=p.match(/^(来自|简介)[：:]\s*(.+)/);
if(kv){if(kv[1]==='来自')ifrom=kv[2];}
else if(!iname)iname=p;
});
return '<span class="stat-change" style="border-left:3px solid var(--ok)">🎁 '+iname+' <span class="stat-plus">+1</span>'+(ifrom?' · 来自 '+ifrom:'')+'</span>'});

html=html.replace(new RegExp(esc(SCENE_END_HINT).replace(/\u2026/g,'\u2026'),'g'),`<span class="scene-end">${esc(SCENE_END_HINT)}</span>`);
html=html.replace(new RegExp(esc(REPORT_HINT),'g'),`<span class="reminder">${esc(REPORT_HINT)}</span>`);
html=html.replace(/\n/g,'<br>');
return html}

function importGameData(){
  var input=document.createElement("input");
  input.type="file";
  input.accept="application/json";
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var loaded=JSON.parse(ev.target.result);
        if(loaded.state){
          G=loaded.state;
          if(G.dailySummaries===undefined)G.dailySummaries=[];
          if(G.dayActionLog===undefined)G.dayActionLog=[];
          if(G.actionsLeft===undefined)G.actionsLeft=5;
          if(G.maxActions===undefined)G.maxActions=5;
          if(G.reportedToSchool===undefined)G.reportedToSchool=true;
          if(G.inScene===undefined)G.inScene=false;
          if(G.wallGenerated===undefined)G.wallGenerated=[];
        }
        if(loaded.convHist)convHist=loaded.convHist;
        if(loaded.chatHistories)chatHistories=loaded.chatHistories;
        if(loaded.wallPosts)wallPosts=loaded.wallPosts;
        if(G.started){
          showGameScr();
          updTop();
          renderStats();
          renderFav();
          // ★ 核心修改：恢复完整剧情显示
          if(loaded.storyHtml){
            document.getElementById("storyTxt").innerHTML=loaded.storyHtml;
          }else{
            // 兼容旧存档（没有storyHtml字段）
            document.getElementById("storyTxt").innerHTML=
              '<span class="meta-line">📂 导入成功！继续你的大学生活吧</span><br><br>'+
              '上次玩到第'+G.semester+'学期第'+G.day+'天。<br>'+
              '（旧版存档未保存剧情画面，请继续行动即可）';
          }
          // 滚动到底部
          var sb=document.getElementById('storyBox');
          if(sb)sb.scrollTop=sb.scrollHeight;
          toast("✅ 进度导入成功","ok");
        }else{
          location.reload();
        }
      }catch(err){
        toast("❌ 存档文件无效","info");
      }
    };
    reader.readAsText(file);
    input.value="";
  };
  input.click();
}

async function showDailyEventModal(){

document.getElementById('eventChoices').innerHTML='';

const prompt=`请为TF大学学生${G.pName}（${G.pGender}，性格${G.pPersonality}）生成一个今天结束前的突发事件。
【重要规则】
- 玩家是${G.pName}，玩家是第一人称视角
- 可出现的NPC只有：${npcList}
- ${G.pName}是玩家自己，绝对不能作为NPC出现
- 事件结果的数值变化中，不允许出现"好感_${G.pName}"
要求：
1. 事件可以与NPC角色相关，或仅与玩家自己有关
2. 例如：妈妈发消息问近况、收到通知、${npcNames.length?npcNames[Math.floor(Math.random()*npcNames.length)]:'朋友'}邀请、网购到货等
3. 简短描述事件（30-50字）
4. 给出2个选项
格式（严格）：
事件：xxx描述
A. 选项A描述
B. 选项B描述
直接输出，不要其他说明。`;
const ac=new AbortController();let full='';
await streamAPI([{role:'system',content:'你是突发事件生成器，只输出指定格式'},{role:'user',content:prompt}],
(c,f)=>{full=f;document.getElementById('eventContent').innerHTML=esc(f).replace(/\n/g,'<br>')+'<span class="tc"></span>'},
(finalText)=>{
full=finalText||'妈妈给你发来消息，问你最近过得怎么样。\nA. 简单回复"挺好的"\nB. 详细聊聊近况';
const lines=full.split('\n').filter(l=>l.trim());let eventDesc='';let optA='';let optB='';
lines.forEach(l=>{const ma=l.match(/^A[.、]\s*(.+)/);const mb=l.match(/^B[.、]\s*(.+)/);
if(ma)optA=ma[1].trim();else if(mb)optB=mb[1].trim();
else if(l.match(/^事件[：:]/))eventDesc+=l.replace(/^事件[：:]\s*/,'')+' ';else eventDesc+=l+' '});
eventDesc=eventDesc.trim();
document.getElementById('eventContent').innerHTML=esc(eventDesc);
const choicesEl=document.getElementById('eventChoices');choicesEl.innerHTML='';
[['A',optA],['B',optB]].forEach(([lbl,t])=>{
const b=document.createElement('button');b.className='mc-b';b.textContent=`${lbl}. ${t}`;
b.onclick=()=>pickEventOption(lbl,t,eventDesc);choicesEl.appendChild(b)})},ac.signal);
window._eventResolve=resolve})}

async function pickEventOption(label,text,eventDesc){
document.getElementById('eventChoices').innerHTML='';
const resultEl=document.getElementById('eventResult');resultEl.style.display='block';
resultEl.innerHTML='<div class="ld"><span></span><span></span><span></span></div> 生成结果...';
const npcNames2=Object.keys(G.favor);
const prompt=`突发事件：${eventDesc}
玩家${G.pName}选择了：${label}. ${text}
【重要】${G.pName}是玩家自己，数值变化中绝对不允许出现"好感_${G.pName}"。
可用的好感变化对象只有：${npcNames2.map(n=>'好感_'+n).join('、')}
请生成这个选择的结果（60-100字）：
1. 简短描述结果发生了什么
2. 文末必须给出数值变化
3. 数值变化要符合事件和选择的合理影响
格式（严格）：
[结果描述]
{{数值变化: 社交+2, 好感_某某+1}}
直接输出，不要其他说明。`;
const ac=new AbortController();
await streamAPI([{role:'system',content:'你是结果生成器'},{role:'user',content:prompt}],
(c,f)=>{resultEl.innerHTML=formatEventResult(f)},
(finalText)=>{resultEl.innerHTML=formatEventResult(finalText||'你做出了选择。\n{{数值变化: 社交+1}}');
parseStats(finalText||'{{数值变化: 社交+1}}');
parseGifts(finalText||'');
document.getElementById('eventCloseBtn').style.display='block'},ac.signal)}

function formatEventResult(text){
let html=esc(text);
html=html.replace(/\{\{数值变化:\s*([^}]+)\}\}/g,(_,c)=>`<div style="margin-top:8px;padding:6px 8px;background:var(--glass-btn);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);border-radius:6px;font-weight:700">📊 数值变化：${colorStatNumbers(c)}</div>`);
html=html.replace(/\{\{获得物品[：:]\s*([^}]+)\}\}/g,function(_,c){
var parts=c.split(/[,，]/).map(function(s){return s.trim()});
var iname='';
parts.forEach(function(p){var kv=p.match(/^(来自|简介)[：:]\s*(.+)/);if(!kv&&!iname)iname=p});
return '<div style="margin-top:6px;padding:5px 8px;background:var(--glass-btn);backdrop-filter:var(--glass-blur);border:var(--glass-btn-border);border-radius:6px;border-left:3px solid var(--ok);font-weight:700">🎁 '+iname+' <span class="stat-plus">+1</span></div>'});
html=html.replace(/\n/g,'<br>');return html}

function parseGifts(txt,defaultFrom){
if(!G.inventory)G.inventory={bought:[],gifted:[]};
var re=/\{\{获得物品[：:]\s*([^}]+)\}\}/g;
var m;
while((m=re.exec(txt))!==null){
var inner=m[1];
var iname='',ifrom=defaultFrom||'',idesc='';
inner.split(/[,，]/).map(function(s){return s.trim()}).forEach(function(part){
var kv=part.match(/^(来自|简介)[：:]\s*(.+)/);
if(kv){if(kv[1]==='来自')ifrom=kv[2].trim();else if(kv[1]==='简介')idesc=kv[2].trim()}
else if(!iname)iname=part.trim()});
if(iname&&G.inventory.gifted.length<50){
G.inventory.gifted.push({name:iname,desc:idesc||iname,from:ifrom||'未知'});
toast('🎁 获得物品：'+iname,'ok')}}}

function addToCart(type,catKey,idx){
var data=SP[type];if(!data)return;
var cat=data.c[catKey];if(!cat)return;
var item=cat.i[idx];if(!item)return;
showModal('加入购物车','确定将「'+item[1]+'」加入购物车吗？',[
{text:'确认',action:function(){
var exist=cart.find(function(c){return c.name===item[1]&&c.catKey===catKey});
if(exist){exist.qty++}
else{cart.push({name:item[1],desc:item[2],price:item[0],qty:1,catKey:catKey,shopType:type})}
toast('🛒 已加入购物车','ok');renderShopProds()}},
{text:'取消',action:function(){}}])}

function cartQty(name,catKey,delta){
var ci=cart.findIndex(function(c){return c.name===name&&c.catKey===catKey});
if(ci===-1)return;
cart[ci].qty+=delta;
if(cart[ci].qty<=0)cart.splice(ci,1);
if(shopView==='prods')renderShopProds();
if(shopView==='cart')renderShopCartView()}

function doCheckout(total){
if(G.wealth<total){toast('💰 余额不足！还差¥'+(total-G.wealth),'info');return}
showModal('💳 确定支付吗？','总计：¥'+total+'\n当前余额：¥'+G.wealth+'\n支付后余额：¥'+(G.wealth-total),[
{text:'✅ 确认支付',action:function(){
G.wealth-=total;
if(!G.inventory)G.inventory={bought:[],gifted:[]};
cart.forEach(function(c){
for(var q=0;q<c.qty;q++){
if(G.inventory.bought.length<50){
G.inventory.bought.push({name:c.name,desc:c.desc,catKey:c.catKey,shopType:c.shopType})}}});
updTop();renderStats();updShopWealth();
cart=[];renderShopCartView();
toast('✅ 支付成功！物品已存入背包','ok')}},
{text:'取消',action:function(){}}])}

function sendStory(prompt){
if(!isRefreshing)saveStorySnapshot('story',prompt);
const st=document.getElementById('storyTxt');
st.innerHTML='<div class="ld"><span></span><span></span><span></span></div> <span class="gen-tag">生成中……</span>';

function handleSend(){
const input=document.getElementById('uInput');const txt=input.value.trim();if(!txt)return;input.value='';
if(!G.started){toast('请先开始游戏','info');return}
if(chatTarget&&currentPanel==='chat'){sendChatMsg(txt);return}
if(streaming){toast('请等待生成完毕','info');return}
if(G.actionsLeft<=0){toast('今日行动次数已用完','info');return}
if(G.energy<=0){toast('精力耗尽','info');return}
G.actionsLeft--;G.dayActionLog.push(`自定义:${txt}`);
if(G.inScene){G.inScene=false;sendSceneEnd(`玩家自定义行动："${txt}"`)}
else{sendStory(`玩家自定义行动："${txt}"
精力${G.energy}/${G.mxE}性格${G.pPersonality}
叙事200-350字：状态行；判断合理；对话格式动作+<dlg>引语</dlg>；选项ABC+D；{{数值变化}}`)}}

async function doPeek(){
const result=document.getElementById('peekResult');
const eligible=Object.entries(G.favor).filter(([n,v])=>v>60);
if(eligible.length===0){result.innerHTML='<div style="color:var(--tx2);text-align:center;padding:10px">(抱歉!偷看失败啦~)</div>';return}
if(G.energy<10){result.innerHTML='<div style="color:var(--tx2);text-align:center;padding:10px">(抱歉!偷看失败啦~精力不足)</div>';return}
G.energy-=10;updTop();
result.innerHTML='<div class="ld"><span></span><span></span><span></span></div> 正在偷看...';
const charDescs=eligible.map(([n,v])=>`${n}（好感${v}）：${CHARS[n].pers}`).join('\n');
const prompt=`你是心理学家。请生成以下角色对玩家${G.pName}（${G.pGender}，性格${G.pPersonality}）的内心想法。
【可被偷看的角色】（好感度>60）
${charDescs}
每个人写一段内心独白（30-60字），符合其性格特征和好感度阶段，要真实自然不油腻。
格式：
${eligible.map(([n])=>`【${n}】内心独白...`).join('\n')}
直接输出，无前缀。`;
const ac=new AbortController();
const msgs=[{role:'system',content:'你是角色内心独白生成器'},{role:'user',content:prompt}];
await streamAPI(msgs,(c,f)=>{
const lines=f.split('\n').filter(l=>l.trim());
result.innerHTML=lines.map(l=>{const m=l.match(/【(.+?)】(.+)/);if(m)return `<div class="peek-thought"><b>💭 ${m[1]}：</b>${esc(m[2])}</div>`;return ''}).join('')+'<span class="tc"></span>'},
(finalText)=>{
const lines=(finalText||'').split('\n').filter(l=>l.trim());
result.innerHTML=lines.map(l=>{const m=l.match(/【(.+?)】(.+)/);if(m)return `<div class="peek-thought"><b>💭 ${m[1]}：</b>${esc(m[2])}</div>`;return ''}).join('');
toast('👀 偷看成功','love')},ac.signal)}

function renderCharSelect(){
const el=document.getElementById('charSelect');
const names=Object.keys(G.favor);
el.innerHTML=names.map(n=>{const c=CHARS[n];const f=G.favor[n]||0;let st=f>80?'💕恋人':f>50?'💗心动':f>20?'😊熟悉':'👋陌生';
return `<div class="char-card" onclick="startChat('${n}')"><div class="cn">${n}</div><div class="cm">${c.major}</div><div class="cf">♥ ${f} ${st}</div></div>`}).join('')}

function startChat(name){
chatTarget=name;
document.getElementById('charSelect').style.display='none';
document.getElementById('chatList').style.display='flex';
document.getElementById('chatSubHdr').style.display='flex';
document.getElementById('chatSubName').textContent=name+' · '+CHARS[name].role.split('/')[0];
applyChatBg();
renderChatHist(name);
document.getElementById('uInput').placeholder=`给${name}发消息...`}

function renderChatHist(name){
const el=document.getElementById('chatList');
if(!chatHistories[name]||!chatHistories[name].length){el.innerHTML=`<div style="text-align:center;color:var(--tx3);font-size:12px;padding:20px">和${name}开始聊天 💬<br>不消耗精力，话术影响好感</div>`;return}
let lastAiIdx=-1;
chatHistories[name].forEach(function(m,i){if(m.role==='assistant')lastAiIdx=i});
el.innerHTML=chatHistories[name].map(function(m,idx){
if(m.role==='user')return `<div class="msg me">${esc(m.content)}</div>`;
const parts=m.content.split('|||').map(s=>stripFavorTags(s)).filter(s=>s&&!s.startsWith('{{'));
let html=parts.map(function(p){return `<div class="msg them"><div class="mn">${name}</div>${esc(p)}</div>`}).join('');
if(idx===lastAiIdx&&!isRefreshingChat&&chatRefreshData&&chatRefreshData.name===name){
html+=`<button class="chat-refresh-btn" onclick="refreshChat()">🔄</button>`}
return html}).join('');
el.scrollTop=el.scrollHeight}

function sendChatMsg(text){
if(!chatTarget||!text.trim())return;const name=chatTarget;
if(!chatHistories[name])chatHistories[name]=[];
if(!isRefreshingChat){
chatRefreshData={name:name,G:JSON.parse(JSON.stringify(G)),chatHistory:JSON.parse(JSON.stringify(chatHistories[name])),userMsg:text}}
const cl=document.getElementById('chatList');
cl.querySelectorAll('.chat-refresh-btn').forEach(function(b){b.remove()});
cl.innerHTML+=`<div class="msg me">${esc(text)}</div>`;
const loadId='ld_'+Date.now();
cl.innerHTML+=`<div class="msg them" id="${loadId}"><div class="mn">${name}</div><div class="ld"><span></span><span></span><span></span></div></div>`;
cl.scrollTop=cl.scrollHeight;
chatStream(name,text,(chunk,full)=>{
const ldEl=document.getElementById(loadId);if(!ldEl)return;
const parts=full.split('|||').map(s=>stripFavorTags(s)).filter(s=>s&&!s.startsWith('{{'));
let html=parts.map((p,i)=>`<div class="msg them"${i===0?` id="${loadId}"`:''}><div class="mn">${name}</div>${esc(p)}<span class="tc"></span></div>`).join('');
if(html)ldEl.outerHTML=html;cl.scrollTop=cl.scrollHeight},
(full)=>{cl.querySelectorAll('.tc').forEach(function(c){c.remove()});
const fmPlus=full.match(/\{\{好感\+(\d+)\}\}/);const fmMinus=full.match(/\{\{好感-(\d+)\}\}/);
if(fmPlus){const v=parseInt(fmPlus[1]);G.favor[name]=Math.min(100,(G.favor[name]||0)+v);toast(`💕 ${name} 好感+${v}`,'love');renderFav()}
else if(fmMinus){const v=parseInt(fmMinus[1]);G.favor[name]=Math.max(0,(G.favor[name]||0)-v);toast(`💔 ${name} 好感-${v}`,'love');renderFav()}
parseGifts(full,name);
const rb=document.createElement('button');rb.className='chat-refresh-btn';rb.innerHTML='🔄';rb.onclick=refreshChat;cl.appendChild(rb);
cl.scrollTop=cl.scrollHeight})}

function generateInitWall(){
wallPosts=[];
const tpls=['今天在{p}看到一个{f}的男生，{a}，好心动！','有没有人认识{p}那个{f}的学长？','在{p}偶遇{f}的学长，{a}','求问！{p}{a}的男生是谁','被{p}的{f}学长{a}了'];
const ps=['教学楼','图书馆','食堂','篮球场','小红楼','音乐楼'];
const fs=['戴眼镜','穿白T恤','笑起来有虎牙','眼睛很好看','身高185+','声音超好听'];
const as=['帮我捡了书','冲我笑了一下','在练琴','在跳舞','请我喝了奶茶','在认真看书'];
const ids=['酸辣粉同学','手抓饼学长','奶茶妹妹','篮球少年','图书馆幽灵','小红楼琴声'];
const cms=['前排吃瓜🍉','蹲后续','好甜啊','笑死','DNA动了'];
for(let i=0;i<10;i++){
let t=tpls[Math.floor(Math.random()*tpls.length)].replace('{p}',ps[Math.floor(Math.random()*ps.length)]).replace('{f}',fs[Math.floor(Math.random()*fs.length)]).replace('{a}',as[Math.floor(Math.random()*as.length)]);
const cc=[];for(let j=0;j<Math.floor(Math.random()*3);j++)cc.push({id:ids[Math.floor(Math.random()*ids.length)],text:cms[Math.floor(Math.random()*cms.length)]});
wallPosts.push({id:ids[Math.floor(Math.random()*ids.length)],text:t,likes:Math.floor(Math.random()*50),liked:false,time:`${Math.floor(Math.random()*12)+1}小时前`,comments:cc})}}

function refreshWall(){
if(!API_URL||!API_KEY||!MODEL){generateInitWall();renderWall();toast('🔄 已刷新','info');return}
const el=document.getElementById('wallBody');
el.innerHTML='<div style="text-align:center;padding:30px;color:var(--tx3)"><div class="ld"><span></span><span></span><span></span></div><br>AI生成中...</div>';
const prevTexts=G.wallGenerated||[];
const prompt=`生成8条TF大学表白墙全新匿名投稿。要求：1.校园氛围 2.可隐晦涉角色但不直说名字 3.格式：每行 匿名ID|内容 4.ID用有趣昵称
${prevTexts.length?'已生成关键词避免重复：'+prevTexts.slice(-20).join('、'):''}
直接输出8行，无说明。`;
const msgs=[{role:'system',content:'你是表白墙生成器，只输出内容。'},{role:'user',content:prompt}];
const ac=new AbortController();
streamAPI(msgs,()=>{},(finalText)=>{
const newPosts=[];
const lines=finalText.split('\n').filter(l=>l.trim());
const ids=['酸辣粉同学','手抓饼学长','奶茶妹妹','篮球少年','图书馆幽灵'];
const cms=['前排吃瓜🍉','蹲后续','好甜啊','笑死','DNA动了'];
lines.forEach(line=>{
const parts=line.split('|');
const id=parts.length>1?parts[0].trim().replace(/^[\d.、\s@]+/,''):ids[Math.floor(Math.random()*ids.length)];
const txt=parts.length>1?parts.slice(1).join('|').trim():line.trim().replace(/^[\d.、\s]+/,'');
if(txt&&txt.length>5){
const cc=[];for(let j=0;j<Math.floor(Math.random()*2);j++)cc.push({id:ids[Math.floor(Math.random()*ids.length)],text:cms[Math.floor(Math.random()*cms.length)]});
newPosts.push({id,text:txt,likes:Math.floor(Math.random()*30),liked:false,time:'刚刚',comments:cc});
if(!G.wallGenerated)G.wallGenerated=[];G.wallGenerated.push(txt.slice(0,15))}});
if(newPosts.length){wallPosts=newPosts;toast('🔄 AI刷新成功','ok')}else{generateInitWall();toast('🔄 已刷新','info')}
renderWall()},ac.signal)}

function renderWall(){
const el=document.getElementById('wallBody');
el.innerHTML=wallPosts.map((p,i)=>`<div class="wall-card"><div class="wc-top"><span class="wc-id">@${p.id}</span><span class="wc-time">${p.time}</span></div><div class="wc-txt">${p.text}</div><div class="wc-acts"><button class="wc-btn ${p.liked?'liked':''}" onclick="likePost(${i})">${p.liked?'❤️':'🤍'} ${p.likes}</button><button class="wc-btn" onclick="commentPost(${i})">💬 ${p.comments.length}</button></div>${p.comments.length?`<div class="wc-comments">${p.comments.map(c=>`<div class="wc-cm"><b>@${c.id}：</b>${c.text}</div>`).join('')}</div>`:''}</div>`).join('')}

function likePost(i){wallPosts[i].liked=!wallPosts[i].liked;wallPosts[i].likes+=wallPosts[i].liked?1:-1;renderWall()}
function commentPost(i){const cms=['前排吃瓜🍉','蹲后续','好甜啊','笑死','DNA动了'];wallPosts[i].comments.push({id:'我',text:cms[Math.floor(Math.random()*cms.length)]});renderWall();toast('💬 评论成功','info')}
function postWall(){const input=document.getElementById('wallInput');const txt=input.value.trim();if(!txt)return;input.value='';wallPosts.unshift({id:'匿名同学',text:txt,likes:0,liked:false,time:'刚刚',comments:[]});G.fame=Math.min(100,G.fame+1);renderWall();toast('✅ 投稿成功','ok')}

function getSaveData(slot){try{return JSON.parse(localStorage.getItem('tf_save_'+slot))}catch(e){return null}}

function openSaveModal(){
saveMode='save';document.getElementById('saveModalTitle').textContent='💾 选择存档位置';
renderSaveSlots();document.getElementById('saveModal').classList.add('on')}

function openLoadModal(){
saveMode='load';document.getElementById('saveModalTitle').textContent='📂 选择读档位置';
renderSaveSlots();document.getElementById('saveModal').classList.add('on')}

function closeSaveModal(){document.getElementById('saveModal').classList.remove('on')}

function renderSaveSlots(){
const wrap=document.getElementById('saveSlots');let html='';
for(let i=1;i<=3;i++){
const data=getSaveData(i);
if(data){
const date=new Date(data.ts).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
html+=`<div class="save-slot" onclick="${saveMode==='save'?`doSaveSlot(${i})`:`doLoadSlot(${i})`}"><div class="ss-title">📁 存档 ${i}${saveMode==='save'?'（覆盖）':''}</div><div class="ss-info">玩家：${data.state.pName||'未知'} · ${data.state.mode==='custom'?'自定义':'扮演'+data.state.mode}<br>第${data.state.semester}学期第${data.state.day}天 · 保存于 ${date}</div></div>`
}else{
html+=`<div class="save-slot empty" onclick="${saveMode==='save'?`doSaveSlot(${i})`:''}"><div class="ss-title">📁 存档 ${i}</div><div class="ss-info">${saveMode==='save'?'空槽位，点击保存':'空槽位'}</div></div>`}}
wrap.innerHTML=html}

function doSaveSlot(slot){
try{localStorage.setItem('tf_save_'+slot,JSON.stringify({state:G,conv:convHist.slice(-10),chatH:chatHistories,wall:wallPosts.slice(0,10),ts:Date.now()}));
toast(`💾 已存入存档${slot}`,'ok');closeSaveModal()}catch(e){toast('❌ 存档失败','info')}}

function doLoadSlot(slot){
try{const d=getSaveData(slot);if(!d){toast('该存档为空','info');return}
G=d.state;convHist=d.conv||[];chatHistories=d.chatH||{};wallPosts=d.wall||[];
if(!G.dailySummaries)G.dailySummaries=[];if(!G.dayActionLog)G.dayActionLog=[];
if(G.actionsLeft===undefined)G.actionsLeft=5;if(G.maxActions===undefined)G.maxActions=5;
if(G.reportedToSchool===undefined)G.reportedToSchool=true;
if(G.inScene===undefined)G.inScene=false;
if(G.inventory===undefined)G.inventory={bought:[],gifted:[]};
closeSaveModal();
if(G.started){showGameScr();document.getElementById('storyTxt').innerHTML='<span class="meta-line">📂 读档成功 - 存档'+slot+'</span><br><br>继续大学生活...选择行动按钮或输入指令推进。';toast('📂 读档成功','ok')}}catch(e){toast('❌ 读档失败','info')}}

function openSummary(){
const list=document.getElementById('summaryList');
if(!G.dailySummaries||!G.dailySummaries.length){list.innerHTML='<div style="text-align:center;color:var(--tx2);padding:20px;font-size:12px">还没有任何日记总结<br>结束本日后会自动生成总结</div>'}
else{list.innerHTML=G.dailySummaries.slice().reverse().map(s=>`<div class="summary-item"><div class="sm-h">【第${s.semester}学期|第${s.day}天】</div><div class="sm-c">${esc(s.content)}</div></div>`).join('')}
document.getElementById('summaryModal').classList.add('on')}
function closeSummary(){document.getElementById('summaryModal').classList.remove('on')}

document.getElementById('uInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();handleSend()}});
document.getElementById('wallInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();postWall()}});
window.addEventListener('load',()=>{if(!API_URL||!API_KEY)setTimeout(()=>toast('请先点击⚙️配置API','info'),800)});
</script>
